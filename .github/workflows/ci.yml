name: Go Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Trigger on pushes to main request targeting main
on:
  push:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests II
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the Go environment
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Specify your Go version or use a stable alias
          go-version: '1.25'
          # Automatically handle caching for faster runs
          cache: false

      # Step 3: Install dependencies
      # 'go mod download' is usually cleaner for CI than 'go get'
      - name: Install dependencies
        run: go mod download

      # Step 4: Build the application (optional, ensures it compiles)
      - name: Build
        run: go build -v ./...

      # Step 5: Run tests with race detection and verbose output
      #- name: Run tests
        #run: go test -v -race ./...
        #run: go test -v -race ./...
